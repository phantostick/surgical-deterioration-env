name: surgical-deterioration-env
version: "1.0.0"
description: >
  A post-surgical ward monitoring environment where an AI agent acts as a
  clinical early-warning system. The agent monitors patient vitals, detects
  deterioration before it becomes critical, and decides when to escalate care —
  balancing sensitivity (catch every deterioration) against specificity
  (avoid false alarms that erode clinical trust).

author: "SAM"
license: "MIT"

tasks:
  - id: task1_single_patient_escalation
    name: "Single Patient Escalation"
    difficulty: easy
    description: >
      Monitor a single post-surgical patient over 4 hours (8 steps of 30 min).
      The patient has one clearly deteriorating vital trend. Decide at each step
      whether to monitor, call the doctor, or activate rapid response.
    max_steps: 8
    reward_range: [0.0, 1.0]

  - id: task2_subtle_deterioration
    name: "Subtle Deterioration Detection"
    difficulty: medium
    description: >
      Monitor 5 patients over 12 hours (24 steps). One patient is deteriorating
      subtly across multiple vitals simultaneously. Identify and escalate the
      correct patient early enough to prevent a critical event.
    max_steps: 24
    reward_range: [0.0, 1.0]

  - id: task3_ward_triage
    name: "Full Ward Triage Under Scarcity"
    difficulty: hard
    description: >
      Manage a 20-patient post-surgical ward over a 12-hour shift (24 steps).
      Three patients are deteriorating at different rates. Only one rapid
      response activation is allowed per hour. False alarms reduce future
      credibility. Optimize lives saved, early detection, and alarm accuracy.
    max_steps: 24
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  description: "Ward state with per-patient vitals, flags, and resource availability"

action_space:
  type: object
  description: "Per-patient action: monitor | call_doctor | rapid_response | order_labs"

server:
  port: 7860
  health_endpoint: /health
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state